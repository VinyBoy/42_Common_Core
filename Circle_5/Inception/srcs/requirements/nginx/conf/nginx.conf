user  www-data;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout  65;

  # Logs
  access_log  /var/log/nginx/access.log;

  # Security-ish defaults (optional but common)
  server_tokens off;
  client_max_body_size 20m;

  # Upstream PHP-FPM (WordPress container)
  upstream php_fpm {
    server wordpress:9000;
  }

  #Upstream Next.js (new)
	upstream nextjs_app {
    	server nextjs:3000;
  }
  
  # HTTP -> HTTPS redirect (Next.js app subdomain) (new)
  server {
    listen 80;
    server_name app.${DOMAIN_NAME};
    return 301 https://$host$request_uri;
  }

  # HTTP -> HTTPS redirect
  server {
    listen 80;
    server_name ${DOMAIN_NAME};
    return 301 https://$host$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl http2;
    server_name ${DOMAIN_NAME};

    # TLS
    ssl_certificate     /etc/nginx/ssl/${DOMAIN_NAME}.crt;
    ssl_certificate_key /etc/nginx/ssl/${DOMAIN_NAME}.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # WordPress files (shared volume with wordpress)
    root /var/www/html;
    index index.php index.html;

    location / {
      try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
      include fastcgi_params;
      fastcgi_pass php_fpm;

      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_param PATH_INFO       $fastcgi_path_info;

      fastcgi_read_timeout 60;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|ttf|woff|woff2)$ {
      expires 7d;
      access_log off;
    }
  }

	# HTTPS server (Next.js app subdomain) (new)
  server {
    listen 443 ssl http2;
    server_name app.${DOMAIN_NAME};

    # TLS (same cert/key file; must cover app.${DOMAIN_NAME} to avoid browser warning)
    ssl_certificate     /etc/nginx/ssl/${DOMAIN_NAME}.crt;
    ssl_certificate_key /etc/nginx/ssl/${DOMAIN_NAME}.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Next.js reverse proxy
    location / {
      proxy_pass http://nextjs_app;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket support (useful later)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}