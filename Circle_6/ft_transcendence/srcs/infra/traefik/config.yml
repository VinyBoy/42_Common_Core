entryPoints:
  web:
    address: ":81"
  websecure:
    address: ":444"
  traefik:
    address: ":8080"
  metrics:
    address: ":8082"

providers:
  docker:
    exposedByDefault: false
    endpoint: "unix:///var/run/docker.sock"
  file:
    directory: /etc/traefik/dynamic
    watch: true

api:
  dashboard: true
  insecure: true

ping:
  entryPoint: traefik

log:
  level: INFO

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0