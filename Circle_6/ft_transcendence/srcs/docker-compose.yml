name: ${COMPOSE_PROJECT_NAME:-transcendance}

networks:
  proxy:
    name: ${COMPOSE_PROJECT_NAME:-transcendance}_proxy
  backend:
    name: ${COMPOSE_PROJECT_NAME:-transcendance}_backend
  observability:
    name: ${COMPOSE_PROJECT_NAME:-transcendance}_observability

volumes:
  pgdata:
    name: ${PGDATA_VOLUME_NAME:-pgdata}
  app_node_modules:
    name: ${APP_NODE_MODULES_VOLUME_NAME:-app_node_modules}
  app_next_cache:
    name: ${APP_NEXT_CACHE_VOLUME_NAME:-app_next_cache}
  prometheus_data:
    name: ${PROMETHEUS_DATA_VOLUME_NAME:-prometheus_data}
  grafana_data:
    name: ${GRAFANA_DATA_VOLUME_NAME:-grafana_data}

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  app_secret_key:
    file: ./secrets/app_secret_key.txt

services:
  traefik:
    image: traefik:v3.6
    container_name: ${COMPOSE_PROJECT_NAME:-transcendance}_traefik
    command:
      - "--configFile=/etc/traefik/config.yml"
    ports:
      - "${TRAEFIK_HTTP_PORT:-8081}:81"
      - "${TRAEFIK_HTTPS_PORT:-8443}:444"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
      - "9091:8082"
    volumes:
      - "${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro"
      - "./infra/traefik/config.yml:/etc/traefik/config.yml:ro"
      - "./infra/traefik/dynamic:/etc/traefik/dynamic:ro"
      - "./infra/traefik/certs:/certs:ro"
    networks:
      - proxy
      - observability
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 1s
      timeout: 2s
      retries: 15
      start_period: 2s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
      POSTGRES_USER: ${POSTGRES_USER:-transcendence}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      TZ: Europe/Paris
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/backups:/backups:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transcendence} -d ${POSTGRES_DB:-transcendence}"]
      interval: 1s
      timeout: 2s
      retries: 15
      start_period: 2s
    restart: unless-stopped

  nextjs:
    networks:
      - proxy
      - backend
    build:
      context: ./nextjs
      dockerfile: Dockerfile
    container_name: ${APP_CONTAINER_NAME:-nextjs}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      BASE_URL: ${BASE_URL:-https://app.localhost:8443}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${POSTGRES_DB:-transcendence}
      DATABASE_USER: ${POSTGRES_USER:-transcendence}
      DATABASE_PASSWORD_FILE: /run/secrets/postgres_password
      APP_SECRET_KEY_FILE: /run/secrets/app_secret_key
      TZ: Europe/Paris
    secrets:
      - postgres_password
      - app_secret_key
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
    - ./nextjs:/app
    - app_node_modules:/app/node_modules
    - app_next_cache:/app/.next
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME:-transcendance}_proxy"
      # HTTP -> redirect HTTPS
      - "traefik.http.routers.nextjs.rule=Host(`${APP_HOST:-app.localhost}`)"
      - "traefik.http.routers.nextjs.entrypoints=web"
      - "traefik.http.routers.nextjs.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.port=8443"
      # HTTPS router
      - "traefik.http.routers.nextjs-secure.rule=Host(`${APP_HOST:-app.localhost}`)"
      - "traefik.http.routers.nextjs-secure.entrypoints=websecure"
      - "traefik.http.routers.nextjs-secure.tls=true"
      # Service internal port (Next écoute sur 3000)
      - "traefik.http.services.nextjs.loadbalancer.server.port=${APP_INTERNAL_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${APP_INTERNAL_PORT:-3000}/api/healthz >/dev/null || exit 1"]
      interval: 1s
      timeout: 2s
      retries: 15
      start_period: 5s

  backup:
    image: postgres:16-alpine
    container_name: ${BACKUP_CONTAINER_NAME:-backup}
    depends_on:
      - postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
      POSTGRES_USER: ${POSTGRES_USER:-transcendence}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-21600}
      BACKUP_PREFIX: ${BACKUP_PREFIX:-transcendance}
      TZ: Europe/Paris
    secrets:
      - postgres_password
    networks:
      - backend
    volumes:
      - ./data/backups:/backups
    command: >
      sh -c '
        set -e;
        mkdir -p /backups;
        while true; do
          export PGPASSWORD="$$(cat /run/secrets/postgres_password)";
          TS="$$(date +%F_%H%M%S)";
          FILE="/backups/$${BACKUP_PREFIX}_$${TS}.sql.gz";
          pg_dump -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" | gzip > "$${FILE}";
          ls -1t /backups/*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm -f;
          sleep "$${BACKUP_INTERVAL_SECONDS}";
        done
      '
    restart: unless-stopped 

  prometheus:
    image: prom/prometheus
    container_name: ${COMPOSE_PROJECT_NAME:-transcendance}_prometheus
    user: "0"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - observability
    depends_on:
      traefik:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ${COMPOSE_PROJECT_NAME:-transcendance}_node_exporter
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - observability
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ${COMPOSE_PROJECT_NAME:-transcendance}_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks:
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: ${COMPOSE_PROJECT_NAME:-transcendance}_grafana
    user: "0"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-ChangeMe_42!}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.localhost:8443}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_SECURITY_X_CONTENT_TYPE_OPTIONS: "true"
      GF_SECURITY_X_XSS_PROTECTION: "true"
      TZ: Europe/Paris
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/custom-dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - proxy
      - observability
    depends_on:
      prometheus:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME:-transcendance}_proxy"
      # HTTP -> HTTPS
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOST:-grafana.localhost}`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.routers.grafana.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.port=8443"
      # HTTPS
      - "traefik.http.routers.grafana-secure.rule=Host(`${GRAFANA_HOST:-grafana.localhost}`)"
      - "traefik.http.routers.grafana-secure.entrypoints=websecure"
      - "traefik.http.routers.grafana-secure.tls=true"
      - "traefik.http.routers.grafana-secure.middlewares=grafana-auth"
      - "traefik.http.middlewares.grafana-auth.basicauth.removeheader=true"
      - "traefik.http.middlewares.grafana-auth.basicauth.users=monitor:$$apr1$$G9kvyf/1$$3/VLtPZCj3YZCeqQ7/MgS/"
      # Grafana écoute en interne sur 3000
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped